  /api/v1/staff_endpoints/telegram_vehicle_requests/:
    get:
      operationId: staff_endpoints_telegram_vehicle_requests_list
      description: |-
        Возвращает список заявок, созданных через Telegram-бота.

        Эндпоинт поддерживает:
        - поиск;
        - фильтрацию по статусу обработки;
        - фильтрацию по наличию привязанного авто;
        - фильтрацию по наличию VIN;
        - фильтрацию по наличию госномера;
        - сортировку через query-параметр `ordering`.

        Для сортировки по убыванию перед названием поля нужно поставить `-`.

        Примеры:
        - `?ordering=created_at`
        - `?ordering=-created_at`
        - `?ordering=detected_license_plate`
        - `?ordering=-detected_vin_code`
      summary: Список Telegram-заявок на идентификацию авто
      parameters:
      - in: query
        name: has_car
        schema:
          type: string
        description: 'Фильтр по наличию привязанного `ClientCar`. Значения: `true`,
          `false`, `1`, `0`, `yes`, `no`.'
        examples:
          ЕстьАвто:
            value: 'true'
            summary: Есть авто
          НетАвто:
            value: 'false'
            summary: Нет авто
      - in: query
        name: has_plate
        schema:
          type: string
        description: 'Фильтр по наличию распознанного госномера. Значения: `true`,
          `false`, `1`, `0`, `yes`, `no`.'
        examples:
          ЕстьГосномер:
            value: 'true'
            summary: Есть госномер
          НетГосномера:
            value: 'false'
            summary: Нет госномера
      - in: query
        name: has_vin
        schema:
          type: string
        description: 'Фильтр по наличию распознанного VIN. Значения: `true`, `false`,
          `1`, `0`, `yes`, `no`.'
        examples:
          ЕстьVIN:
            value: 'true'
            summary: Есть VIN
          НетVIN:
            value: 'false'
            summary: Нет VIN
      - in: query
        name: ordering
        schema:
          type: string
        description: |-
          Поле сортировки.

          Разрешённые поля:
          - `id`
          - `created_at`
          - `updated_at`
          - `telegram_username`
          - `detected_license_plate`
          - `detected_vin_code`
          - `client_car__license_plate`
          - `client_car__vin_code`
          - `client_car__client__first_name`
          - `client_car__client__last_name`
          - `client_car__client__phone`

          Для сортировки по убыванию добавь `-` перед названием поля.
        examples:
          IDПоВозрастанию:
            value: id
            summary: ID по возрастанию
          IDПоУбыванию:
            value: -id
            summary: ID по убыванию
          НовыеСверху:
            value: -created_at
            summary: Новые сверху
          ГосномерА→Я:
            value: detected_license_plate
            summary: Госномер А → Я
          VINА→Я:
            value: detected_vin_code
            summary: VIN А → Я
          ТелефонКлиента:
            value: client_car__client__phone
            summary: Телефон клиента
      - in: query
        name: search
        schema:
          type: string
        description: Поиск по ID заявки, Telegram username, найденному госномеру,
          VIN, госномеру авто клиента, VIN авто клиента, имени клиента, фамилии клиента
          и телефону.
        examples:
          ПоискПоГосномеру:
            value: 777ABC02
            summary: Поиск по госномеру
          ПоискПоVIN:
            value: JTDBR32E
            summary: Поиск по VIN
          ПоискПоТелефону:
            value: '+7701'
            summary: Поиск по телефону
      - in: query
        name: status
        schema:
          type: string
        description: |-
          Логический статус обработки заявки.

          `new` — нет госномера, VIN и привязанного авто.
          `in_progress` — часть данных уже найдена, но заявка не завершена.
          `car_found` — найден госномер, VIN и авто, но VIN ещё не записан в авто.
          `done` — VIN найден и записан в авто клиента.
        examples:
          Новые:
            value: new
          ВРаботе:
            value: in_progress
            summary: В работе
          АвтоНайдено:
            value: car_found
            summary: Авто найдено
          Готово:
            value: done
      tags:
      - Staff / Telegram Vehicle Requests
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffTelegramVehicleRequestList'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Нет staff-доступа.
