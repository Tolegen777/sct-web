      - Staff / Packages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffServicePackageWriteRequest'
            examples:
              СозданиеПакета:
                value:
                  category_id: 1
                  modification_source_id: '20637615__20674985'
                  title: Замена масла Hyundai Tucson 2.0 AT
                  status: DRAFT
                  short_description: Комплект замены масла с фильтром и работой.
                  description: В пакет входит масло, фильтр и работа мастера.
                  has_promotion: true
                  promotion_title: Скидка 15% до конца месяца
                  promotion_terms: Акция действует только при онлайн-записи.
                  price_mode: AUTO
                  currency: KZT
                  discount_type: PERCENT
                  discount_percent: '10.00'
                  discount_amount: '0.00'
                  manual_price: null
                  is_featured: false
                  sort_order: 100
                  package_items:
                  - item_id: 1
                    price_id: 1
                    quantity: '4.000'
                    discount_type: NONE
                    discount_percent: '0.00'
                    discount_amount: '0.00'
                    is_required: true
                    is_included: true
                    sort_order: 10
                    comment: Моторное масло
                summary: Создание пакета
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffServicePackageWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffServicePackageWriteRequest'
