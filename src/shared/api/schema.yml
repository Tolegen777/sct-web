components:
  schemas:
    ClientActiveCar:
      type: object
      properties:
        id:
          type: integer
        display_name:
          type: string
        license_plate:
          type: string
        modification_source_id:
          type: string
        car_title:
          type: string
      required:
      - car_title
      - display_name
      - id
      - license_plate
      - modification_source_id
    ClientDefaultServicePage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        category:
          allOf:
          - $ref: '#/components/schemas/ClientPackageCategory'
          readOnly: true
        title:
          type: string
          readOnly: true
          title: Заголовок страницы
          description: 'Например: Замена масла в двигателе'
        slug:
          type: string
          readOnly: true
          description: 'URL-идентификатор страницы. Например: zamena-masla-v-dvs'
          pattern: ^[-a-zA-Z0-9_]+$
        status:
          allOf:
          - $ref: '#/components/schemas/StatusAcbEnum'
          readOnly: true
          title: Статус
        status_display:
          type: string
          readOnly: true
        short_description:
          type: string
          readOnly: true
          title: Короткое описание
          description: Короткий текст для карточек, списков и hero-блока.
        description:
          type: string
          readOnly: true
          title: Полное описание
          description: Основной текст страницы услуги.
        hero_eyebrow:
          type: string
          readOnly: true
          title: Надзаголовок hero-блока
        availability_title:
          type: string
          readOnly: true
          title: Заголовок блока доступности
        availability_message:
          type: string
          readOnly: true
          title: Сообщение блока доступности
        price_note:
          type: string
          readOnly: true
          title: Пояснение по цене
        important_note:
          type: string
          readOnly: true
          title: Важное примечание
          description: 'Например: точная стоимость зависит от модификации автомобиля,
            рынка поставки, двигателя и комплектации.'
        what_is_included:
          readOnly: true
          title: Что входит в услугу
          description: 'Список пунктов для фронтенда. Например: ["Проверка автомобиля",
            "Подбор расходников", "Работа мастера"]'
        why_price_depends:
          readOnly: true
          title: Почему цена зависит от автомобиля
          description: Список причин, почему нельзя сразу показать точную цену.
        is_featured:
          type: boolean
          readOnly: true
          title: Показывать в популярных
        sort_order:
          type: integer
          readOnly: true
          title: Порядок сортировки
        seo_title:
          type: string
          readOnly: true
        seo_description:
          type: string
          readOnly: true
        service_source_type:
          type: string
          readOnly: true
        price:
          type: object
          additionalProperties: {}
          readOnly: true
      required:
      - availability_message
      - availability_title
      - category
      - description
      - hero_eyebrow
      - id
      - important_note
      - is_featured
      - price
      - price_note
      - seo_description
      - seo_title
      - service_source_type
      - short_description
      - slug
      - sort_order
      - status
