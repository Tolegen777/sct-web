  /api/v1/staff_endpoints/bookings/:
    get:
      operationId: staff_endpoints_bookings_list
      description: |-
        Возвращает список заявок клиентов `ClientServiceAppointment` для staff-интерфейса.

        Эндпоинт поддерживает:
        - фильтрацию по статусу заявки;
        - фильтрацию по типу услуги;
        - фильтрацию по СТО;
        - фильтрацию по диапазону дат визита;
        - поиск по клиенту, телефону, email, госномеру, VIN, названию услуги и авто;
        - сортировку через query-параметр `ordering`.

        Сортировка по возрастанию:
        `?ordering=created_at`

        Сортировка по убыванию:
        `?ordering=-created_at`

        Можно сортировать сразу по нескольким полям:
        `?ordering=status,-created_at`
      summary: Список заявок клиентов для staff-админки
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
          format: date
        description: 'Начальная дата визита включительно. Формат: `YYYY-MM-DD`.'
        examples:
          С1Июня2026:
            value: '2026-06-01'
            summary: С 1 июня 2026
      - in: query
        name: date_to
        schema:
          type: string
          format: date
        description: 'Конечная дата визита включительно. Формат: `YYYY-MM-DD`.'
        examples:
          До30Июня2026:
            value: '2026-06-30'
            summary: До 30 июня 2026
      - in: query
        name: ordering
        schema:
          type: string
        description: |-
          Поле сортировки.

          Разрешённые поля:
          - `id`
          - `created_at`
          - `updated_at`
          - `preferred_date`
          - `preferred_time`
          - `status`
          - `client__full_name`
          - `client__phone`
          - `client_car__license_plate`
          - `client_car__vin_code`
          - `service_station__name`

          Для сортировки по убыванию добавь `-` перед названием поля.

          Примеры:
          - `created_at`
          - `-created_at`
          - `status,-created_at`
        examples:
          ПоIDПоВозрастанию:
            value: id
            summary: По ID по возрастанию
          ПоIDПоУбыванию:
            value: -id
            summary: По ID по убыванию
          НовыеСверху:
            value: -created_at
            summary: Новые сверху
          ГосномерА→Я:
            value: client_car__license_plate
            summary: Госномер А → Я
          Статус,ПотомДата:
            value: status,-created_at
            summary: Статус, потом дата
      - in: query
        name: search
        schema:
          type: string
        description: |-
          Поисковая строка. Ищет по:
          - имени клиента;
          - фамилии клиента;
          - телефону клиента;
          - email клиента;
          - госномеру автомобиля;
          - VIN-коду автомобиля;
          - названию услуги;
          - названию автомобиля.
        examples:
          ПоискПоТелефону:
            value: '+7701'
            summary: Поиск по телефону
          ПоискПоГосномеру:
            value: 777ABC02
            summary: Поиск по госномеру
          ПоискПоVIN:
            value: JTDBR32E
            summary: Поиск по VIN
      - in: query
        name: service_type
        schema:
          type: string
        description: |-
          Фильтр по типу услуги.

          `PACKAGE` — заявки по `ServicePackage`.
          `DEFAULT` — заявки по `DefaultServicePage`.
        examples:
          ПакетнаяУслуга:
            value: PACKAGE
            summary: Пакетная услуга
          ДефолтнаяУслуга:
            value: DEFAULT
            summary: Дефолтная услуга
      - in: query
        name: station_id
        schema:
          type: integer
        description: ID СТО, по которой нужно отфильтровать заявки.
        examples:
          СТОID1:
            value: 1
            summary: СТО ID 1
      - in: query
        name: status
        schema:
          type: string
        description: Фильтр по статусу заявки.
        examples:
          Создана:
            value: CREATED
          Подтверждена:
            value: CONFIRMED
          Отменена:
            value: CANCELLED
      tags:
      - Staff / Bookings
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffBookingList'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: У пользователя нет прав staff-доступа.
