  /api/v1/staff_endpoints/auth/refresh/:
    post:
      operationId: staff_endpoints_auth_refresh_create
      description: "\nОбновляет `access` token по действующему `refresh` token.\n\n###
        Важно\n\nЭтот endpoint не создаёт нового пользователя и не проверяет пароль.\nОн
        только принимает refresh token и возвращает новый access token.\n        "
      summary: Refresh staff access token
      tags:
