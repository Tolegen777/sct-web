  /api/v1/staff_endpoints/auth/login/:
    post:
      operationId: staff_endpoints_auth_login_create
      description: "\nАвторизация сотрудника / staff-пользователя.\n\n### Правила\n\n-
        Вход выполняется только по `username`.\n- Email здесь не используется.\n-
        Пользователь должен иметь `is_staff_user=True`.\n- Пользователь должен быть
        активным: `is_active=True`.\n- В ответ возвращаются `access`, `refresh` и
        краткая информация о пользователе.\n        "
      summary: Staff login
      tags:
      - Staff / Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
            examples:
              LoginRequest:
                value:
                  username: manager_1
                  password: strong-password
                summary: Login request
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffLoginRequest'
        required: true
      security:
      - Authorization: []
        Language: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffLogin'
              examples:
                LoginResponse:
                  value:
                    access: jwt-access-token
                    refresh: jwt-refresh-token
                    user:
                      id: 1
                      username: manager_1
                      email: manager@example.com
                      first_name: Manager
                      last_name: One
                      is_active: true
                      is_staff: false
                      is_superuser: false
                      is_staff_user: true
                      user_type: staff
                  summary: Login response
          description: JWT tokens successfully issued.
        '400':
          description: Invalid credentials.
  /api/v1/staff_endpoints/auth/logout/:
    post:
      operationId: staff_endpoints_auth_logout_create
      description: "\nВыход staff-пользователя из системы.\n\n### Как работает\n\nFrontend
        отправляет текущий `refresh` token.\nBackend добавляет этот refresh token
        в blacklist.\nПосле этого refresh token нельзя использовать для получения
        нового access token.\n        "
      summary: Staff logout
      tags:
      - Staff / Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaffLogoutRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/StaffLogoutRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/StaffLogoutRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '205':
          description: Successfully logged out.
        '400':
          description: Invalid refresh token.
        '401':
          description: Authentication credentials were not provided.
  /api/v1/staff_endpoints/auth/profile/:
    get:
      operationId: staff_endpoints_auth_profile_retrieve
      description: "\nВозвращает данные текущего авторизованного staff-пользователя.\n\n###
        Правила\n\n- Требуется JWT access token.\n- Пользователь должен быть staff-пользователем:
        `is_staff_user=True`.\n        "
      summary: Current staff profile
