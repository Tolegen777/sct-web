    Status10eEnum:
      enum:
      - DRAFT
      - PUBLISHED
      - UNPUBLISHED
      - ARCHIVED
      type: string
      description: |-
        * `DRAFT` - Черновик
        * `PUBLISHED` - Опубликован
        * `UNPUBLISHED` - Снят с публикации
        * `ARCHIVED` - Архивирован
    Status1f3Enum:
      enum:
      - DRAFT
      - CREATED
      - CONFIRMED
      - IN_PROGRESS
      - COMPLETED
      - CANCELLED_BY_CLIENT
      - CANCELLED_BY_STAFF
      - NO_SHOW
      type: string
      description: |-
        * `DRAFT` - Черновик
        * `CREATED` - Создана
        * `CONFIRMED` - Подтверждена
        * `IN_PROGRESS` - В работе
        * `COMPLETED` - Завершена
        * `CANCELLED_BY_CLIENT` - Отменена клиентом
        * `CANCELLED_BY_STAFF` - Отменена сотрудником
        * `NO_SHOW` - Клиент не приехал
    StatusAcbEnum:
      enum:
      - ACTIVE
      - INACTIVE
      - ARCHIVED
      type: string
      description: |-
        * `ACTIVE` - Активна
        * `INACTIVE` - Неактивна
        * `ARCHIVED` - Архивирована
    StatusBe2Enum:
      enum:
      - ACTIVE
      - INACTIVE
      - ARCHIVED
      type: string
      description: |-
        * `ACTIVE` - Активен
        * `INACTIVE` - Неактивен
        * `ARCHIVED` - В архиве
    StatusC5bEnum:
      enum:
      - ACTIVE
      - INACTIVE
      - ARCHIVED
      type: string
      description: |-
        * `ACTIVE` - Активен
        * `INACTIVE` - Неактивен
        * `ARCHIVED` - Архивирован
