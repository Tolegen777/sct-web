openapi: 3.0.3
info:
  title: Template
  version: 1.0.0
  description: API description
paths:
  /api/schema/:
    get:
      operationId: api_schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
          enum:
          - en
      tags:
      - api
      security:
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/vnd.oai.openapi:
              schema:
                type: object
                additionalProperties: {}
            application/yaml:
              schema:
                type: object
                additionalProperties: {}
            application/vnd.oai.openapi+json:
              schema:
                type: object
                additionalProperties: {}
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/v1/cars/filters/:
    get:
      operationId: cars_filters_retrieve
      description: |-
        Этапы 3 и 4.

        Возвращает:
        - текущее количество подходящих модификаций
        - доступные значения фильтров

        Обязательные параметры:
        - mark
        - model

        Допустимые фильтры:
        - year
        - body_type
        - generation
        - fuel_type
        - engine_volume
        - horse_power
        - transmission_type
        - drive_type
        - steering_wheel_position
      tags:
      - cars
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/cars/marks/:
    get:
      operationId: cars_marks_retrieve
      description: |-
        Этап 1.
        Возвращает полный список марок с логотипами и количеством модификаций.
      tags:
      - cars
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/cars/models/:
    get:
      operationId: cars_models_retrieve
      description: |-
        Этап 2.
        Возвращает список моделей выбранной марки и количество подходящих модификаций.
      tags:
      - cars
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/cars/modifications/:
    get:
      operationId: cars_modifications_retrieve
      description: |-
        Список реальных модификаций для браузерного конфигуратора.

        Обязательные параметры:
        - mark
        - model

        Опциональные параметры:
        - year
        - body_type
        - generation
        - fuel_type
        - engine_volume
        - horse_power
        - transmission_type
        - drive_type
        - steering_wheel_position
        - page
        - page_size
      tags:
      - cars
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v1/client_endpoints/auth/login/:
    post:
      operationId: client_endpoints_auth_login_create
      description: Авторизация клиента по номеру телефона и паролю.
      summary: Вход клиента
      tags:
      - Client / Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientLoginRequest'
            examples:
              ПримерВходаКлиента:
                value:
                  phone: '+770100000001'
                  password: string
                summary: Пример входа клиента
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientLoginRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientLoginRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTokenResponse'
          description: ''
        '400':
          description: Ошибка авторизации
  /api/v1/client_endpoints/auth/profile/:
    get:
      operationId: client_endpoints_auth_profile_retrieve
      description: Возвращает профиль текущего авторизованного клиента. JWT токен
        принадлежит main.User, поэтому дополнительно проверяется, что для пользователя
        существует Client-профиль.
      summary: Профиль текущего клиента
      tags:
      - Client / Auth
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientProfile'
          description: ''
        '403':
          description: Текущий пользователь не является клиентом
  /api/v1/client_endpoints/auth/refresh/:
    post:
      operationId: client_endpoints_auth_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - client_endpoints
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
        required: true
      security:
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/client_endpoints/auth/register/:
    post:
      operationId: client_endpoints_auth_register_create
      description: Создает нового клиента. Клиент регистрируется по номеру телефона,
        имени и паролю. Email необязателен.
      summary: Регистрация клиента
      tags:
      - Client / Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientRegisterRequest'
            examples:
              ПримерРегистрацииКлиента:
                value:
                  phone: +7 701 000 0001
                  password: strong_password_123
                  first_name: Нурсултан
                  last_name: Кужагалиев
                  middle_name: ''
                  email: null
                summary: Пример регистрации клиента
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientRegisterRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientRegisterRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientTokenResponse'
          description: ''
        '400':
          description: Ошибка валидации
  /api/v1/client_endpoints/garage/cars/:
    get:
      operationId: client_endpoints_garage_cars_list
      summary: Список автомобилей клиента
      tags:
      - Client / Garage
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientGarageCar'
          description: ''
    post:
      operationId: client_endpoints_garage_cars_create
      summary: Добавить автомобиль в гараж клиента
      tags:
      - Client / Garage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientGarageCarWriteRequest'
            examples:
              ДобавлениеАвтомобиля:
                value:
                  modification_source_id: '21795128__21795134'
                  license_plate: 777ABC02
                  vin_code: JTDBR32E720000000
                  nickname: Моя Camry
                  is_default: true
                  mileage_km: 85000
                summary: Добавление автомобиля
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientGarageCarWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientGarageCarWriteRequest'
        required: true
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientGarageCar'
          description: ''
        '400':
          description: Ошибка валидации.
  /api/v1/client_endpoints/garage/cars/{car_id}/:
    get:
      operationId: client_endpoints_garage_cars_retrieve
      summary: Детальная информация об автомобиле клиента
      parameters:
      - in: path
        name: car_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Garage
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientGarageCar'
          description: ''
    patch:
      operationId: client_endpoints_garage_cars_partial_update
      summary: Обновить автомобиль клиента
      parameters:
      - in: path
        name: car_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Garage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClientGarageCarWriteRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClientGarageCarWriteRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClientGarageCarWriteRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientGarageCar'
          description: ''
        '400':
          description: Ошибка валидации.
        '404':
          description: Автомобиль не найден.
    delete:
      operationId: client_endpoints_garage_cars_destroy
      description: Физически удаляет автомобиль из гаража клиента.
      summary: Удалить автомобиль клиента
      parameters:
      - in: path
        name: car_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Garage
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '204':
          description: Автомобиль удалён.
        '404':
          description: Автомобиль не найден.
  /api/v1/client_endpoints/garage/cars/{car_id}/set-default/:
    post:
      operationId: client_endpoints_garage_cars_set_default_create
      summary: Сделать автомобиль основным
      parameters:
      - in: path
        name: car_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Garage
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientGarageCar'
          description: ''
        '404':
          description: Автомобиль не найден.
  /api/v1/client_endpoints/garage/form-page-data/:
    get:
      operationId: client_endpoints_garage_form_page_data_retrieve
      description: "\nВозвращает все данные для клиентских страниц:\n\n- `add_car.html`\n-
        `change_car.html`\n- `edit_car.html`\n\nEndpoint доступен только авторизованному
        клиенту.\n\nРежимы:\n\n- `mode=add` — добавить автомобиль\n- `mode=edit&car_id=<id>`
        — редактировать автомобиль\n- `mode=change` — выбрать автомобиль из гаража\n
        \       "
      summary: Данные для страниц клиентского гаража
      parameters:
      - in: query
        name: car_id
        schema:
          type: integer
        description: ID автомобиля клиента. Нужен для mode=edit.
      - in: query
        name: mode
        schema:
          type: string
        description: 'Режим страницы: add, edit, change.'
      tags:
      - Client / Garage
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientGarageFormPageData'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
        '404':
          description: Автомобиль не найден.
  /api/v1/client_endpoints/packages/:
    get:
      operationId: client_endpoints_packages_retrieve
      description: "\nВозвращает пакеты услуг, подходящие под активный автомобиль
        текущего клиента.\n\nАктивный автомобиль определяется так:\n1. сначала берётся
        активный автомобиль `is_default=True`;\n2. если такого нет, берётся последний
        активный автомобиль клиента.\n\nВ ответе отдельно возвращаются:\n- `regular_packages`
        — опубликованные пакеты без акции;\n- `promotional_packages` — опубликованные
        акционные пакеты.\n\nЕсли у клиента нет активного автомобиля, эндпоинт вернёт
        пустые списки.\n        "
      summary: Пакеты услуг для активного автомобиля клиента
      tags:
      - Client / Packages
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPackagesPage'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
  /api/v1/client_endpoints/packages/{package_id}/:
    get:
      operationId: client_endpoints_packages_retrieve_2
      description: "\nВозвращает детальную информацию по одному опубликованному пакету.\n\nВажно:\n-
        клиент может получить только пакет, который подходит под его активный автомобиль;\n-
        пакет должен быть в статусе `PUBLISHED`;\n- черновики, архивные и снятые с
        публикации пакеты клиенту не показываются.\n        "
      summary: Детальная информация о пакете услуги
      parameters:
      - in: path
        name: package_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Packages
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientServicePackage'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
        '404':
          description: Пакет не найден или не подходит под активный автомобиль.
  /api/v1/client_endpoints/packages/default-services/{default_service_id}/:
    get:
      operationId: client_endpoints_packages_default_services_retrieve
      description: "\nВозвращает детальную информацию по дефолтной услуге.\n\nЭта
        страница используется тогда, когда точный ServicePackage\nпод автомобиль клиента
        пока не найден.\n        "
      summary: Детальная информация о дефолтной услуге
      parameters:
      - in: path
        name: default_service_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Packages
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientDefaultServicePage'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
        '404':
          description: Дефолтная услуга не найдена.
  /api/v1/client_endpoints/service-book/bookings/:
    get:
      operationId: client_endpoints_service_book_bookings_list
      summary: Список записей клиента на сервис
      parameters:
      - in: query
        name: car_id
        schema:
          type: integer
      - in: query
        name: limit
        schema:
          type: integer
      - in: query
        name: offset
        schema:
          type: integer
      - in: query
        name: period
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
      tags:
      - Client / Service Book / Bookings
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientServiceBooking'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
  /api/v1/client_endpoints/service-book/bookings/{booking_id}/:
    get:
      operationId: client_endpoints_service_book_bookings_retrieve
      summary: Детальный просмотр записи клиента на сервис
      parameters:
      - in: path
        name: booking_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Service Book / Bookings
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientServiceBooking'
          description: ''
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
        '404':
          description: Запись не найдена.
    put:
      operationId: client_endpoints_service_book_bookings_update
      summary: Полное редактирование записи клиента на сервис
      parameters:
      - in: path
        name: booking_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Service Book / Bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientServiceBooking'
          description: ''
        '400':
          description: Ошибка валидации.
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Редактирование запрещено.
        '404':
          description: Запись не найдена.
    patch:
      operationId: client_endpoints_service_book_bookings_partial_update
      summary: Частичное редактирование записи клиента на сервис
      parameters:
      - in: path
        name: booking_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Service Book / Bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedClientServiceBookingUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedClientServiceBookingUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedClientServiceBookingUpdateRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientServiceBooking'
          description: ''
        '400':
          description: Ошибка валидации.
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Редактирование запрещено.
        '404':
          description: Запись не найдена.
  /api/v1/client_endpoints/service-book/bookings/{booking_id}/cancel/:
    post:
      operationId: client_endpoints_service_book_bookings_cancel_create
      description: |-
        Отменяет запись на сервис текущего клиента.

        Клиент может отменить только свою запись.
        Отмена разрешена только для записей в статусах DRAFT, CREATED, CONFIRMED.
      summary: Отмена записи на сервис клиентом
      parameters:
      - in: path
        name: booking_id
        schema:
          type: integer
        required: true
      tags:
      - Client / Service Book / Bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingCancelRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingCancelRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingCancelRequest'
      security:
      - jwtAuth: []
      - cookieAuth: []
      - Authorization: []
        Language: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientServiceBooking'
          description: ''
        '400':
          description: Запись уже нельзя отменить.
        '401':
          description: Пользователь не авторизован.
        '403':
          description: Пользователь не является клиентом.
        '404':
          description: Запись не найдена.
  /api/v1/client_endpoints/service-book/create_booking/:
    post:
      operationId: client_endpoints_service_book_create_booking_create
      summary: Создание записи клиента на сервис
      tags:
      - Client / Service Book / Bookings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientServiceBookingCreateRequest'
            examples:
              ПримерСозданияЗаписи:
                value:
